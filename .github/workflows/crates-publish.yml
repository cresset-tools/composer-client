name: crates-publish

# Publish every workspace crate to crates.io in dependency order, on the
# `release: published` event that release-please fires when it cuts a per-crate
# `<crate>-v<version>` GitHub Release (crates are versioned independently).
#
# cargo-workspaces topologically orders the crates, waits for each to appear in
# the index before publishing its dependents, and SKIPS any crate whose current
# version is already on crates.io — so this job is idempotent: if it dies
# halfway (flaky network, index lag), just re-run it and it resumes.
#
# `--publish-as-is` publishes the versions exactly as committed at the tag.
# release-please (rust release-type + cargo-workspace plugin) already set each
# crate's own version and the inter-crate dependency pins; we do NOT
# bump/commit/tag here, only publish.

on:
  release:
    types: [published]

permissions:
  contents: read
  # Mint a short-lived OIDC token that crates.io exchanges for a temporary,
  # publish-scoped API token (Trusted Publishing). No long-lived secret.
  # Each crate needs a Trusted Publisher configured on crates.io pointing at
  # (cresset-tools/composer-client, crates-publish.yml).
  id-token: write

# Never cancel a publish mid-flight — a partially-published workspace is worse
# than waiting. (Re-running later is safe; already-published crates are skipped.)
concurrency:
  group: crates-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    # Per-crate tags are `composer-<name>-v<version>`; match any of them so each
    # crate's release triggers a publish (cargo-workspaces is idempotent — it
    # skips crates already on crates.io — so a run per tag is safe). The guard
    # keeps a stray manual release from triggering a publish.
    if: ${{ startsWith(github.event.release.tag_name, 'composer-') && contains(github.event.release.tag_name, '-v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
          persist-credentials: false

      # rust-toolchain.toml pins the toolchain; rustup installs it on the first
      # cargo invocation. cargo-workspaces is version-pinned for reproducible
      # release behavior.
      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces --version 0.4.2 --locked

      # Speeds up the per-crate `cargo publish` verification builds (each crate
      # is compiled to prove it packages cleanly before upload).
      - name: Cache build
        uses: Swatinem/rust-cache@v2

      # Exchange the workflow's OIDC identity for a temporary crates.io token
      # (valid ~30 min, scoped to the crates that trust this repo+workflow).
      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish to crates.io
        env:
          # cargo reads CARGO_REGISTRY_TOKEN from the env automatically.
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        # --publish-as-is : publish committed versions, no bump/commit/tag.
        # --allow-branch '*' : the tag is checked out as detached HEAD, so the
        #   default branch guard would otherwise reject it.
        # --publish-interval : give the index a moment between uploads.
        # --yes : non-interactive.
        run: |
          cargo ws publish \
            --publish-as-is \
            --allow-branch '*' \
            --publish-interval 15 \
            --yes
